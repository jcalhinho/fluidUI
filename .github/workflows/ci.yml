name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Core (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Benchmark gate
        if: matrix.node == 20
        run: npm run bench:ci

      - name: Upload benchmark artifact
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-node20
          path: bench/results/ci-benchmark.json
          if-no-files-found: error

  example-react:
    name: Example React (Node 20)
    runs-on: ubuntu-latest
    needs: core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/react-dashboard/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm ci --prefix examples/react-dashboard

      - name: Lint example
        run: npm run lint:example

      - name: Test example
        run: npm run test --prefix examples/react-dashboard

      - name: Build example
        run: npm run build --prefix examples/react-dashboard
